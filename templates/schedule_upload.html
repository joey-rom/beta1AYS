<!DOCTYPE html>
<html>
<head>
    <title>HVAC Schedule Extractor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 48px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); max-width: 500px; width: 90%; }
        h1 { color: #2d3748; margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: #718096; margin-bottom: 24px; }
        .drop-zone { border: 2px dashed #cbd5e0; border-radius: 12px; padding: 48px 24px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .drop-zone:hover, .drop-zone.drag-over { border-color: #3182ce; background: #ebf8ff; }
        .drop-zone input { display: none; }
        .drop-zone-icon { font-size: 48px; margin-bottom: 12px; }
        .drop-zone-text { color: #4a5568; font-size: 16px; }
        .drop-zone-text span { color: #3182ce; text-decoration: underline; cursor: pointer; }
        .file-name { margin-top: 12px; color: #2d3748; font-weight: 600; word-break: break-all; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: all 0.2s; }
        .btn-primary { background: #3182ce; color: white; }
        .btn-primary:hover { background: #2c5282; }
        .btn-primary:disabled { background: #a0aec0; cursor: not-allowed; }
        .progress { display: none; margin-top: 24px; }
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3182ce, #63b3ed); width: 0%; transition: width 0.3s; }
        .progress-text { margin-top: 12px; font-size: 14px; color: #4a5568; text-align: center; }
        .error { color: #c53030; margin-top: 16px; font-size: 14px; padding: 12px; background: #fff5f5; border-radius: 8px; display: none; }
        .features { margin-top: 32px; padding-top: 24px; border-top: 1px solid #e2e8f0; }
        .features h3 { font-size: 14px; color: #718096; margin-bottom: 12px; font-weight: 500; }
        .feature-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .feature { background: #f7fafc; padding: 6px 12px; border-radius: 6px; font-size: 12px; color: #4a5568; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Schedule Extractor</h1>
        <p class="subtitle">Upload mechanical schedule PDFs to extract equipment data</p>
        
        <form id="upload-form" enctype="multipart/form-data">
            <div class="drop-zone" id="drop-zone">
                <input type="file" name="file" id="file-input" accept=".pdf">
                <div class="drop-zone-icon">📄</div>
                <div class="drop-zone-text">
                    Drop PDF here or <span>browse</span>
                </div>
                <div class="file-name" id="file-name"></div>
            </div>
            
            <button type="submit" class="btn btn-primary" id="submit-btn" disabled>
                Extract Schedules
            </button>
        </form>
        
        <div class="progress" id="progress">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-text" id="progress-text">Uploading...</div>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="features">
            <h3>Supported Schedule Types</h3>
            <div class="feature-list">
                <span class="feature">AHU</span>
                <span class="feature">RTU</span>
                <span class="feature">VAV</span>
                <span class="feature">VRF</span>
                <span class="feature">Pumps</span>
                <span class="feature">Fans</span>
                <span class="feature">Boilers</span>
                <span class="feature">Chillers</span>
                <span class="feature">Unit Heaters</span>
                <span class="feature">+ More</span>
            </div>
        </div>
    </div>
    
    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileNameDiv = document.getElementById('file-name');
        const submitBtn = document.getElementById('submit-btn');
        const form = document.getElementById('upload-form');
        const progress = document.getElementById('progress');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const errorDiv = document.getElementById('error');
        
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                updateFileName();
            }
        });
        
        fileInput.addEventListener('change', updateFileName);
        
        function updateFileName() {
            if (fileInput.files.length) {
                fileNameDiv.textContent = fileInput.files[0].name;
                submitBtn.disabled = false;
                errorDiv.style.display = 'none';
            }
        }
        
        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            progress.style.display = 'none';
            submitBtn.disabled = false;
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            
            submitBtn.disabled = true;
            progress.style.display = 'block';
            progressFill.style.width = '5%';
            progressText.textContent = 'Uploading...';
            
            try {
                const uploadRes = await fetch('/api/schedule/upload', {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadRes.json();
                
                if (!uploadData.success) {
                    throw new Error(uploadData.error || 'Upload failed');
                }
                
                const jobId = uploadData.job_id;
                progressFill.style.width = '10%';
                progressText.textContent = 'Processing...';
                
                let attempts = 0;
                const maxAttempts = 300;
                
                while (attempts < maxAttempts) {
                    await new Promise(r => setTimeout(r, 1000));
                    attempts++;
                    
                    const statusRes = await fetch(`/api/schedule/status/${jobId}`);
                    const status = await statusRes.json();
                    
                    if (status.error) {
                        throw new Error(status.error);
                    }
                    
                    progressFill.style.width = `${Math.max(10, status.progress)}%`;
                    
                    if (status.status === 'processing') {
                        const currentPage = status.page_count > 0 ? Math.ceil(status.progress / 100 * status.page_count) : '?';
                        progressText.textContent = `Processing page ${currentPage} of ${status.page_count || '?'}...`;
                    }
                    
                    if (status.status === 'completed' || status.status === 'completed_with_errors') {
                        progressFill.style.width = '100%';
                        progressText.textContent = `Found ${status.tables_found} schedules with ${status.total_equipment} equipment items!`;
                        
                        await new Promise(r => setTimeout(r, 1000));
                        window.location.href = `/schedule/results/${jobId}`;
                        return;
                    }
                    
                    if (status.status === 'failed') {
                        throw new Error(status.errors?.join(', ') || 'Extraction failed');
                    }
                }
                
                throw new Error('Processing timeout - please try again');
                
            } catch (err) {
                showError(err.message);
            }
        });
    </script>
</body>
</html>
