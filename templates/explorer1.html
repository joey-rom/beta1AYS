<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AYS — File Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; }
    .navbar { background:#333; color:#fff; padding:10px; display:flex; align-items:center; position:fixed; top:0; left:0; width:100%; z-index:10; }
    .navbar img { height:40px; margin-right:10px; }
    .navbar a { color:#fff; text-decoration:none; margin-left:20px; }
    .container { max-width:1200px; margin:80px auto 40px; padding:20px; background:#fff; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,.1); }
    .header { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .hidden { display:none; }
    .btn { display:inline-block; padding:8px 12px; border:0; border-radius:6px; cursor:pointer; background:#eee; }
    .btn:hover { background:#e1e1e1; }
    .link { color:#1366d6; text-decoration:none; }
    table { width:100%; border-collapse: collapse; margin-top:12px; }
    th, td { border:1px solid #ddd; padding:8px; text-align:left; }
    th { background:#F4A460; color:#fff; }
    td .btn-download { display:inline-block; padding:6px 10px; border-radius:4px; background:#4CAF50; color:#fff; text-decoration:none; }
    td .btn-download:hover { background:#45a049; }
    .crumb { color:#555; }
  </style>
</head>
<body>

  <div class="navbar">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
    <a href="{{ url_for('start_project') }}">Start Project</a>
    <a href="{{ url_for('explorer_page') }}">Explorer</a>
    <a href="{{ url_for('terms') }}">Search Terms</a>
    <a href="{{ url_for('upload_file') }}">Spec Analysis</a>
    <a href="{{ url_for('summarize_pdf') }}">Summary</a>
    <!--<a href="{{ url_for('view_dashboard') }}">API Dashboard</a>-->
  </div>

  <div class="container">
    <div class="header">
      <h2 class="crumb" id="explCrumb">Current path: results/</h2>
      <button id="explUp" class="btn hidden">⬅ Up one level</button>
    </div>

    <table>
      <thead id="explHead"></thead>
      <tbody id="explBody"></tbody>
    </table>
  </div>

<script>
async function loadPath(path) {
  const url = `/api/explorer?path=${encodeURIComponent(path || 'results/')}`;
  const res = await fetch(url);
  if (!res.ok) {
    document.getElementById('explCrumb').textContent = `Error loading: ${path}`;
    return;
  }
  const data = await res.json();
  renderExplorer(data.path, data.items || []);
}

function humanSize(n){
  if (n === undefined || n === null) return "";
  const u = ["B","KB","MB","GB","TB"];
  let i=0, x = Number(n);
  while (x >= 1024 && i < u.length-1){ x/=1024; i++; }
  return `${x.toFixed(1)} ${u[i]}`;
}

function renderExplorer(path, items) {
  const isRoot = (String(path).toLowerCase() === "results/");

  const crumb = document.getElementById("explCrumb");
  crumb.textContent = `Current path: ${path}`;

  const up = document.getElementById("explUp");
  if (isRoot) {
    up.classList.add("hidden");
  } else {
    up.classList.remove("hidden");
    up.onclick = () => {
      const p = path.endsWith("/") ? path.slice(0,-1) : path;
      const parent = p.includes("/") ? p.slice(0, p.lastIndexOf("/")) : "";
      loadPath(parent || "results/");
    };
  }

  const thead = document.getElementById("explHead");
  const tbody = document.getElementById("explBody");
  thead.innerHTML = "";
  tbody.innerHTML = "";

  if (isRoot) {
    thead.innerHTML = `
      <tr>
        <th>Project Name</th>
        <th>Date</th>
        <th>Email</th>
        <th>Size</th>
        <th>Modified</th>
        <th>Actions</th>
      </tr>`;
  } else {
    thead.innerHTML = `
      <tr>
        <th>Name</th>
        <th>Size</th>
        <th>Modified</th>
        <th>Actions</th>
      </tr>`;
  }

  for (const it of items) {
    const tr = document.createElement("tr");

    if (isRoot && it.type === "project") {
      tr.innerHTML = `
        <td>📁 <a href="#" data-key="${it.key}" class="goto">${escapeHtml(it.name)}</a></td>
        <td>${escapeHtml(it.date || "")}</td>
        <td>${escapeHtml(it.email || "")}</td>
        <td></td>
        <td></td>
        <td></td>`;
    } else if (it.type === "dir") {
      tr.innerHTML = `
        <td>📁 <a href="#" data-key="${it.key}" class="goto">${escapeHtml(it.name)}</a></td>
        ${isRoot ? "<td></td><td></td>" : ""}
        <td></td>
        <td></td>
        <td></td>`;
    } else {
      // file row
      const dlHref = `/dl/by-key?key=${encodeURIComponent(it.key)}`;
      tr.innerHTML = `
        <td>📄 ${escapeHtml(it.name)}</td>
        ${isRoot ? "<td></td><td></td>" : ""}
        <td>${humanSize(it.size)}</td>
        <td>${escapeHtml((it.modified || "").replace("T"," ").replace("Z",""))}</td>
        <td><a class="btn-download" href="${dlHref}" target="_blank" rel="noopener">Download</a></td>`;
    }

    tbody.appendChild(tr);
  }

  // Drill into folders
  tbody.querySelectorAll("a.goto").forEach(a => {
    a.addEventListener("click", (e) => {
      e.preventDefault();
      loadPath(a.dataset.key);
    });
  });
}

function escapeHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");}

// initial load
loadPath("results/");
</script>

</body>
</html>
