<!DOCTYPE html>
<html>
<head>
    <title>Processing - Schedule Extractor</title>
    <meta http-equiv="refresh" content="2">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 48px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); max-width: 400px; text-align: center; }
        h1 { color: #2d3748; margin-bottom: 16px; font-size: 24px; }
        .spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #3182ce; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 24px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { color: #4a5568; margin-bottom: 8px; }
        .progress { color: #3182ce; font-weight: 600; font-size: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Processing...</h1>
        <p class="status">{{ status.status }}</p>
        <p class="progress">{{ status.progress }}%</p>
    </div>
</body>
</html>
